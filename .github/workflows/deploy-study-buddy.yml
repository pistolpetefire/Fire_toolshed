# Deploy Fire Toolshed + Study Buddy together on GitHub Pages
#
# Live URLs (repo: pistolpetefire/Fire_toolshed):
#   Fire tools portal:  https://pistolpetefire.github.io/Fire_toolshed/
#   Study Buddy hub:    https://pistolpetefire.github.io/Fire_toolshed/study-buddy/
#   Anatomy app:        https://pistolpetefire.github.io/Fire_toolshed/study-buddy/classes/occc-bio-ap
#
# One-time: Settings → Pages → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: study-buddy/package-lock.json

      - name: Install Study Buddy dependencies
        working-directory: study-buddy
        run: npm ci

      - name: Build Study Buddy (subpath on Pages)
        working-directory: study-buddy
        env:
          # Nested under /Fire_toolshed/study-buddy/ so fire tools keep the site root
          VITE_BASE_PATH: /Fire_toolshed/study-buddy/
        run: npm run build

      - name: SPA fallback for Study Buddy deep links
        run: cp study-buddy/dist/index.html study-buddy/dist/404.html

      - name: Assemble combined site (fire tools + Study Buddy)
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site

          # Copy fire-tool static apps + portal (exclude Study Buddy source & build noise)
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='study-buddy/' \
            --exclude='validation/' \
            --exclude='dist/' \
            --exclude='scripts/' \
            --exclude='src/' \
            --exclude='public/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='tsconfig.json' \
            --exclude='tsconfig.node.json' \
            --exclude='vite.config.ts' \
            --exclude='postcss.config.js' \
            --exclude='tailwind.config.js' \
            --exclude='test-results*.json' \
            --exclude='STUDY-BUDDY.md' \
            --exclude='.gitignore' \
            ./ site/

          # Mount built Study Buddy SPA at /study-buddy/
          mkdir -p site/study-buddy
          cp -a study-buddy/dist/. site/study-buddy/

          echo "Site tree (top level):"
          ls -la site
          echo "Study Buddy:"
          ls -la site/study-buddy | head

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
